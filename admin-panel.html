<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – UndergroundLoops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid #222;
      padding-bottom: 20px;
    }

    header h1 { color: #cc00ff; font-size: 1.2rem; letter-spacing: 2px; }
    header span { color: #555; font-size: 0.8rem; }

    .logout-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #ff4444; color: #ff4444; }

    .section {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 24px;
      max-width: 750px;
    }

    .section h2 {
      font-size: 0.9rem;
      color: #cc00ff;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      color: #aaa;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .pill:hover { border-color: #cc00ff; color: #cc00ff; }
    .pill.active { background: #cc00ff; border-color: #cc00ff; color: #000; font-weight: bold; }

    input[type="text"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #cc00ff; }
    input[type="file"] { padding: 8px; cursor: pointer; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .upload-btn {
      background: #cc00ff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: bold;
      padding: 12px 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .upload-btn:hover { background: #aa00dd; }
    .upload-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .progress { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 16px; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: #cc00ff; width: 0%; transition: width 0.3s; }

    .status { margin-top: 14px; font-size: 0.85rem; color: #888; min-height: 20px; }
    .status.ok { color: #00ffcc; }
    .status.err { color: #ff4444; }

    #loopTypeField { display: block; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚡ ADMIN PANEL</h1>
    <span>Eingeloggt als: BadBoySlim / UndergroundLoops</span>
  </div>
  <button class="logout-btn" onclick="logout()">Ausloggen</button>
</header>

<div class="section">
  <h2>🎵 Track hochladen</h2>

  <!-- KATEGORIE -->
  <div class="field">
    <label>Kategorie</label>
    <div class="pill-group" id="categoryGroup">
      <span class="pill active" data-val="loops" onclick="selectPill(this, 'categoryGroup'); toggleLoopType(this)">Loops</span>
      <span class="pill" data-val="samples" onclick="selectPill(this, 'categoryGroup'); toggleLoopType(this)">Samples</span>
      <span class="pill" data-val="tracks" onclick="selectPill(this, 'categoryGroup'); toggleLoopType(this)">Tracks</span>
      <span class="pill" data-val="acapellas" onclick="selectPill(this, 'categoryGroup'); toggleLoopType(this)">Acapellas</span>
    </div>
  </div>

  <!-- LOOP TYP -->
  <div class="field" id="loopTypeField">
    <label>Loop Typ</label>
    <div class="pill-group" id="loopTypeGroup">
      <span class="pill active" data-val="all" onclick="selectPill(this, 'loopTypeGroup')">All</span>
      <span class="pill" data-val="bass" onclick="selectPill(this, 'loopTypeGroup')">Bass</span>
      <span class="pill" data-val="clap-snare" onclick="selectPill(this, 'loopTypeGroup')">Clap & Snare</span>
      <span class="pill" data-val="hihats" onclick="selectPill(this, 'loopTypeGroup')">Hihats</span>
      <span class="pill" data-val="kick-drums" onclick="selectPill(this, 'loopTypeGroup')">Kick & Drums</span>
      <span class="pill" data-val="percussions" onclick="selectPill(this, 'loopTypeGroup')">Percussions</span>
      <span class="pill" data-val="synth" onclick="selectPill(this, 'loopTypeGroup')">Synth</span>
    </div>
  </div>

  <!-- KEY -->
  <div class="field">
    <label>Key (Tonart)</label>
    <div class="pill-group" id="keyGroup">
      <span class="pill active" data-val="all" onclick="selectPill(this, 'keyGroup')">All</span>
      <span class="pill" data-val="C" onclick="selectPill(this, 'keyGroup')">C</span>
      <span class="pill" data-val="C#" onclick="selectPill(this, 'keyGroup')">C#</span>
      <span class="pill" data-val="D" onclick="selectPill(this, 'keyGroup')">D</span>
      <span class="pill" data-val="D#" onclick="selectPill(this, 'keyGroup')">D#</span>
      <span class="pill" data-val="E" onclick="selectPill(this, 'keyGroup')">E</span>
      <span class="pill" data-val="F" onclick="selectPill(this, 'keyGroup')">F</span>
      <span class="pill" data-val="F#" onclick="selectPill(this, 'keyGroup')">F#</span>
      <span class="pill" data-val="G" onclick="selectPill(this, 'keyGroup')">G</span>
      <span class="pill" data-val="G#" onclick="selectPill(this, 'keyGroup')">G#</span>
      <span class="pill" data-val="A" onclick="selectPill(this, 'keyGroup')">A</span>
      <span class="pill" data-val="A#" onclick="selectPill(this, 'keyGroup')">A#</span>
      <span class="pill" data-val="B" onclick="selectPill(this, 'keyGroup')">B</span>
    </div>
  </div>

  <!-- BPM -->
  <div class="field">
    <label>BPM Range</label>
    <div class="pill-group" id="bpmGroup" style="margin-bottom:10px">
      <span class="pill active" data-val="all" onclick="selectPill(this, 'bpmGroup')">All</span>
      <span class="pill" data-val="slow" onclick="selectPill(this, 'bpmGroup')">Slow &lt;90</span>
      <span class="pill" data-val="mid" onclick="selectPill(this, 'bpmGroup')">Mid 90-130</span>
      <span class="pill" data-val="fast" onclick="selectPill(this, 'bpmGroup')">Fast &gt;130</span>
    </div>
    <input type="number" id="bpmExact" placeholder="Exakter BPM Wert (z.B. 138)" min="40" max="300">
  </div>

  <!-- TITEL & GENRE -->
  <div class="row2">
    <div class="field">
      <label>Track Titel</label>
      <input type="text" id="trackTitle" placeholder="z.B. Dark Bass Loop 001">
    </div>
    <div class="field">
      <label>Genre</label>
      <input type="text" id="trackGenre" placeholder="z.B. Techno, DnB, Ambient">
    </div>
  </div>

  <!-- DATEIEN -->
  <div class="row2">
    <div class="field">
      <label>Audio Datei (MP3 / WAV)</label>
      <input type="file" id="audioFile" accept="audio/*">
    </div>
    <div class="field">
      <label>Cover Bild (JPG / PNG)</label>
      <input type="file" id="coverFile" accept="image/*">
    </div>
  </div>

  <button class="upload-btn" id="uploadBtn" onclick="uploadTrack()">⬆ HOCHLADEN → R2</button>

  <div class="progress" id="progressBar">
    <div class="progress-bar" id="progressFill"></div>
  </div>
  <div class="status" id="uploadStatus"></div>
</div>

<script>
  if (sessionStorage.getItem('admin_logged_in') !== 'true') {
    window.location.href = 'admin.html';
  }

  const WORKER_URL = 'https://undergroundloops-upload.dj-christern.workers.dev';

  function toggleLoopType(el) {
    document.getElementById('loopTypeField').style.display =
      el.dataset.val === 'loops' ? 'block' : 'none';
  }

  function selectPill(el, groupId) {
    document.querySelectorAll(`#${groupId} .pill`).forEach(p => p.classList.remove('active'));
    el.classList.add('active');
  }

  function getSelected(groupId) {
    const active = document.querySelector(`#${groupId} .pill.active`);
    return active ? active.dataset.val : null;
  }

  function logout() {
    sessionStorage.removeItem('admin_logged_in');
    window.location.href = 'admin.html';
  }

  async function uploadTrack() {
    const title = document.getElementById('trackTitle').value.trim();
    const genre = document.getElementById('trackGenre').value.trim();
    const audioFile = document.getElementById('audioFile').files[0];
    const coverFile = document.getElementById('coverFile').files[0];

    const category = getSelected('categoryGroup');
    const loopType = category === 'loops' ? getSelected('loopTypeGroup') : null;
    const key = getSelected('keyGroup');
    const bpmRange = getSelected('bpmGroup');
    const bpmExact = document.getElementById('bpmExact').value;

    if (!title || !audioFile) {
      setStatus('❌ Bitte Titel und Audio-Datei angeben!', 'err');
      return;
    }

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    showProgress(true);

    try {
      const timestamp = Date.now();

      // Audio hochladen
      setStatus('⏳ Audio wird hochgeladen...', '');
      setProgressFill(20);
      const audioKey = `${category}/${timestamp}_${audioFile.name}`;
      await uploadToR2(audioFile, audioKey);
      setProgressFill(60);

      // Cover hochladen
      let coverKey = null;
      if (coverFile) {
        setStatus('⏳ Cover wird hochgeladen...', '');
        coverKey = `covers/${timestamp}_${coverFile.name}`;
        await uploadToR2(coverFile, coverKey);
        setProgressFill(80);
      }

      // Metadaten als JSON
      const meta = {
        id: timestamp,
        title, genre, category, loopType, key,
        bpmRange, bpm: bpmExact || null,
        audioKey, coverKey,
        artist: 'BadBoySlim',
        uploadedAt: new Date().toISOString()
      };

      await uploadToR2(
        new Blob([JSON.stringify(meta)], { type: 'application/json' }),
        `meta/${timestamp}.json`
      );

      setProgressFill(100);
      setStatus(`✅ "${title}" hochgeladen! [${category.toUpperCase()} | Key: ${key} | BPM: ${bpmExact || bpmRange}]`, 'ok');

      // Reset
      document.getElementById('trackTitle').value = '';
      document.getElementById('trackGenre').value = '';
      document.getElementById('audioFile').value = '';
      document.getElementById('coverFile').value = '';
      document.getElementById('bpmExact').value = '';

    } catch (err) {
      setStatus('❌ Fehler: ' + err.message, 'err');
    }

    btn.disabled = false;
    setTimeout(() => showProgress(false), 3000);
  }

  async function uploadToR2(file, key) {
    const response = await fetch(`${WORKER_URL}/upload`, {
      method: 'POST',
      headers: {
        'X-File-Key': key,
        'Content-Type': file.type || 'application/octet-stream',
      },
      body: file
    });
    if (!response.ok) {
      const text = await response.text();
      throw new Error(text || 'Upload fehlgeschlagen');
    }
    return response.json();
  }

  function setStatus(msg, type) {
    const el = document.getElementById('uploadStatus');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function showProgress(show) {
    document.getElementById('progressBar').style.display = show ? 'block' : 'none';
    if (!show) setProgressFill(0);
  }

  function setProgressFill(pct) {
    document.getElementById('progressFill').style.width = pct + '%';
  }
</script>

</body>
</html>
