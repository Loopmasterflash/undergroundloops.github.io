<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERGROUNDLOOPS - Underground Techno & Electronic Loops</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cyberpunk Background -->
    <div class="cyberpunk-bg"></div>
    
    <!-- Main Container -->
    <div class="container">
        
        <!-- Logo -->
        <div class="logo-container">
            <h1 class="neon-logo">UNDERGROUNDLOOPS</h1>
        </div>
        
        <!-- Genre Buttons -->
        <div class="genre-buttons">
            <button class="genre-btn active" data-genre="all">All</button>
            <button class="genre-btn" data-genre="techno">Techno</button>
            <button class="genre-btn" data-genre="minimal">Minimal</button>
            <button class="genre-btn" data-genre="industrial">Industrial</button>
            <button class="genre-btn" data-genre="goa">Goa</button>
            <button class="genre-btn" data-genre="psytrance">Psytrance</button>
        </div>
        
        <!-- Track List Container -->
        <div id="trackListContainer">
            <!-- Loading message -->
            <div class="loading-message">
                <p style="text-align: center; color: #00ffff; font-size: 1.2rem;">
                    🎵 Loading tracks from database...
                </p>
            </div>
        </div>
        
    </div>
    
    <!-- Firebase SDK - Fixed Version -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
