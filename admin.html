<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERGROUNDLOOPS - Admin Panel v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('cyberpunk-skyline.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(255, 0, 255, 0.3);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 30px #ff00ff;
            font-size: 2rem;
            letter-spacing: 3px;
        }

        .subtitle {
            text-align: center;
            color: #00ffff;
            margin-bottom: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: rgba(255, 0, 255, 0.3);
            border: 2px solid #ff00ff;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: rgba(255, 0, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff0000;
        }

        .logout-btn:hover {
            background: rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        .hidden {
            display: none;
        }

        .success {
            padding: 15px;
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            border-radius: 8px;
            color: #00ff00;
            text-align: center;
            margin-bottom: 20px;
        }

        .error {
            padding: 15px;
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            border-radius: 8px;
            color: #ff0000;
            text-align: center;
            margin-bottom: 20px;
        }

        small {
            color: #666;
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="container">
        <h1>ADMIN LOGIN</h1>
        <p class="subtitle">UNDERGROUNDLOOPS v2</p>
        
        <div id="loginError" class="error hidden"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="adminPassword" required placeholder="Enter admin password">
            </div>
            <button type="submit">LOGIN</button>
        </form>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="container hidden">
        <h1>TRACK UPLOAD v2</h1>
        <p class="subtitle">Add New Track to Database</p>
        
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
        
        <div id="successMsg" class="success hidden"></div>
        <div id="errorMsg" class="error hidden"></div>
        
        <form id="uploadForm">
            <div class="form-group">
                <label>Track Type:</label>
                <select id="trackType" required>
                    <option value="">Select Type</option>
                    <option value="loops">Loop</option>
                    <option value="samples">Sample</option>
                    <option value="tracks">Track</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Track Title:</label>
                <input type="text" id="trackTitle" required placeholder="Dark Matter 303">
            </div>
            
            <div class="form-group">
                <label>Artist/Producer:</label>
                <input type="text" id="trackArtist" required placeholder="Your Name">
            </div>
            
            <div class="form-group">
                <label>Genre:</label>
                <select id="trackGenre" required>
                    <option value="">Select Genre</option>
                    <option value="techno">Techno</option>
                    <option value="minimal">Minimal</option>
                    <option value="industrial">Industrial</option>
                    <option value="goa">Goa</option>
                    <option value="psytrance">Psytrance</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>BPM:</label>
                <input type="number" id="trackBPM" placeholder="138" min="60" max="200">
            </div>
            
            <div class="form-group">
                <label>Description (optional):</label>
                <textarea id="trackDescription" rows="3" placeholder="Optional track description..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Audio File URL (from Cloudinary):</label>
                <input type="url" id="audioFileURL" required placeholder="https://res.cloudinary.com/...">
                <small>Upload to Cloudinary first, then paste the URL here</small>
            </div>
            
            <div class="form-group">
                <label>Cover Image URL (from Cloudinary):</label>
                <input type="url" id="coverImageURL" required placeholder="https://res.cloudinary.com/...">
                <small>Upload to Cloudinary first, then paste the URL here</small>
            </div>
            
            <button type="submit">SAVE TO DATABASE</button>
        </form>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        const ADMIN_PASSWORD = "underground2026";
        
        window.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if(isLoggedIn === 'true') {
                showAdminPanel();
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if(password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdminPanel();
            } else {
                errorDiv.textContent = '❌ Invalid password!';
                errorDiv.classList.remove('hidden');
                setTimeout(() => {
                    errorDiv.classList.add('hidden');
                }, 3000);
            }
        });
        
        function showAdminPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginForm').reset();
        }
        
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
            
            const trackData = {
                type: document.getElementById('trackType').value,
                title: document.getElementById('trackTitle').value,
                artist: document.getElementById('trackArtist').value,
                genre: document.getElementById('trackGenre').value,
                bpm: document.getElementById('trackBPM').value || null,
                description: document.getElementById('trackDescription').value || '',
                audioFile: document.getElementById('audioFileURL').value,
                coverImage: document.getElementById('coverImageURL').value,
                uploadedAt: new Date().toISOString(),
                plays: 0,
                likes: 0
            };
            
            try {
                await db.collection('tracks').add(trackData);
                
                successMsg.textContent = `✅ ${trackData.type.toUpperCase()} "${trackData.title}" saved to database!`;
                successMsg.classList.remove('hidden');
                
                document.getElementById('uploadForm').reset();
                window.scrollTo(0, 0);
                
                console.log('Track added:', trackData);
                
            } catch(error) {
                errorMsg.textContent = `❌ Error: ${error.message}`;
                errorMsg.classList.remove('hidden');
                console.error('Error adding track:', error);
            }
        });
    </script>
</body>
</html>
