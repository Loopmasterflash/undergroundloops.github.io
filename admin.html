<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – UndergroundLoops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      width: 360px;
    }

    .login-box h1 {
      font-size: 1.2rem;
      color: #00ffcc;
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-box p {
      color: #555;
      font-size: 0.8rem;
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      padding: 10px 14px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #00ffcc;
    }

    button {
      width: 100%;
      background: #00ffcc;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: bold;
      padding: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover {
      background: #00ddaa;
    }

    .error {
      display: none;
      color: #ff4444;
      font-size: 0.8rem;
      margin-top: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h1>⚡ Admin Login</h1>
  <p>UndergroundLoops – Backstage</p>

  <label>Username</label>
  <input type="text" id="username" placeholder="badboyslim" autocomplete="off">

  <label>Passwort</label>
  <input type="password" id="password" placeholder="••••••••••">

  <button onclick="login()">EINLOGGEN</button>

  <div class="error" id="error">❌ Falscher Username oder Passwort</div>
</div>

<script>
  // Einfacher Admin-Login (für GitHub Pages ohne Backend)
  const ADMIN_USER = 'badboyslim';
  const ADMIN_PASS = 'llowdirekt99+88';

  function login() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if (user === ADMIN_USER && pass === ADMIN_PASS) {
      // Login erfolgreich → Session speichern
      sessionStorage.setItem('admin_logged_in', 'true');
      // Weiterleitung zur Admin-Uploadseite
      window.location.href = 'admin-panel.html';
    } else {
      document.getElementById('error').style.display = 'block';
    }
  }

  // Enter-Taste funktioniert auch
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  // Falls schon eingeloggt → direkt weiterleiten
  if (sessionStorage.getItem('admin_logged_in') === 'true') {
    window.location.href = 'admin-panel.html';
  }
</script>

</body>
</html>
